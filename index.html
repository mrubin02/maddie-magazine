<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maddie Magazine</title>
<style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      letter-spacing: 0.15em;
    }
    p {
      font-size: clamp(2rem, 10vw, 6rem);
      text-transform: uppercase;
    }
    .credits {
      margin-top: 1.5rem;
      text-align: center;
    }
    .credits p {
      font-size: clamp(0.6rem, 1.5vw, 0.85rem);
      letter-spacing: 0.1em;
      line-height: 1.8;
      text-transform: none;
    }
    @keyframes flash {
      0%, 100% { background: #000; color: #fff; }
      50%      { background: #fff; color: #000; }
    }
    html, body {
      animation: flash 0.8s step-end infinite;
    }
  </style>
</head>
<body>
  <p>Coming 2027</p>
  <div class="credits">
    <p>founder: maddie</p>
    <p>editor: maddie</p>
    <p>dp: maddie</p>
  </div>
</body>
</html>
